[[mods]]
modId="darksoulsskills"
version="1.0.0"
displayName="Dark Souls Skills"
description='''
Adds a Dark Souls-style leveling system to Minecraft.
Kill enemies to gain Souls. Spend Souls at a Bonfire to level up your attributes:
Vigor (Max HP), Endurance (Stamina), Strength (Melee Damage), Dexterity (Attack Speed),
Intelligence (Magic), Faith (Regen).
Die and lose your Souls - but you can retrieve them!
'''

